<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品總覽｜萌寵商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-note">滿 NT$3,000 享宅配免運，購買前請確認適用年齡與體型</div>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="index.html"><span class="brand-mark">爪</span><span class="brand-copy">萌寵商城</span></a>
            <form class="global-search-form" role="search"><input type="search" placeholder="搜尋飼料、玩具、清潔用品" aria-label="搜尋商品"><button type="submit">搜尋</button></form>
            <button class="menu-toggle" type="button" aria-label="開啟導覽選單" aria-expanded="false">☰</button>
            <nav class="nav-links" aria-label="主要導覽">
                <a href="index.html">首頁</a><a class="active" href="products.html">商品總覽</a><a href="about.html">關於我們</a><a data-member-link href="login.html">會員登入</a><a class="cart-link" href="cart.html">購物車 <span class="cart-count" data-cart-count>0</span></a>
            </nav>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            <div class="page-header">
                <span class="eyebrow">先排除不適合的選項</span>
                <h1>商品總覽</h1>
                <p>可依寵物、年齡、體型與用途篩選；登入後，符合毛孩資料的商品會優先顯示。</p>
            </div>
            <div class="products-layout">
                <aside class="filter-panel">
                    <h2>篩選條件</h2>
                    <div class="filter-group"><label for="search-input">關鍵字</label><input id="search-input" type="search" placeholder="商品名或成分"></div>
                    <div class="filter-group"><label for="filter-pet">適用寵物</label><select id="filter-pet"><option value="">全部寵物</option><option value="狗">狗</option><option value="貓">貓</option><option value="倉鼠">倉鼠</option><option value="兔子">兔子</option></select></div>
                    <div class="filter-group"><label for="filter-age">適用年齡</label><select id="filter-age"><option value="">全部年齡</option><option value="幼年">幼年</option><option value="成年">成年</option><option value="高齡">高齡</option></select></div>
                    <div class="filter-group"><label for="filter-size">適用體型</label><select id="filter-size"><option value="">全部體型</option><option value="小型">小型</option><option value="中型">中型</option><option value="大型">大型</option></select></div>
                    <div class="filter-group"><label for="filter-category">商品分類</label><select id="filter-category"><option value="">全部分類</option><option value="飼料">飼料</option><option value="罐頭">罐頭</option><option value="零食">零食</option><option value="保健食品">保健食品</option><option value="衛生清潔用品">衛生清潔用品</option><option value="玩具">玩具</option><option value="睡窩與床墊">睡窩與床墊</option><option value="外出用品">外出用品</option><option value="服飾與飾品">服飾與飾品</option></select></div>
                    <button class="btn btn-outline btn-block" id="clear-filters" type="button">清除條件</button>
                </aside>
                <section class="products-content">
                    <div class="products-toolbar"><span id="result-count">正在整理商品...</span><span>推薦順序會參考毛孩資料</span></div>
                    <div class="product-grid" id="all-products-grid"></div>
                </section>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <div><div class="footer-brand">萌寵商城</div><p>幫你更快找到適合毛孩的日常用品，買得簡單，也更安心。</p></div>
            <div><h3>購物說明</h3><div class="footer-links"><a href="about.html#delivery">配送政策</a><a href="about.html#return-policy">退換貨說明</a><a href="about.html#faq">常見問題</a></div></div>
            <div><h3>會員服務</h3><div class="footer-links"><a href="login.html">會員登入</a><a href="register.html">建立毛孩資料</a><a href="member.html">訂單紀錄</a></div></div>
            <div><h3>聯絡我們</h3><p>客服信箱：hello@pawdays.tw<br>服務時間：週一至週五 10:00–18:00</p></div>
        </div>
        <div class="footer-bottom">© 2026 萌寵商城・第十三組期末專案</div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
