<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳｜萌寵商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-note">滿 NT$3,000 宅配免運・下單前記得確認適用年齡與體型</div>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="index.html"><span class="brand-mark">爪</span><span class="brand-copy">萌寵商城</span></a>
            <form class="global-search-form" role="search"><input type="search" placeholder="搜尋飼料、玩具或保健品" aria-label="搜尋商品"><button type="submit">搜尋</button></form>
            <button class="menu-toggle" type="button" aria-label="開啟導覽選單" aria-expanded="false">☰</button>
            <nav class="nav-links" aria-label="主要導覽"><a href="index.html">首頁</a><a href="products.html">商品總覽</a><a href="about.html">關於我們</a><a data-member-link href="login.html">會員登入</a><a class="cart-link active" href="cart.html">購物車 <span class="cart-count" data-cart-count>0</span></a></nav>
        </div>
    </header>
    <main class="page-main">
        <div class="container">
            <div class="page-header"><span class="eyebrow">最後確認</span><h1>結帳資料</h1><p>這是課堂作品的模擬結帳，不會進行實際扣款。</p></div>
            <div class="checkout-layout">
                <form class="checkout-form-card" id="checkout-form">
                    <h2>收件資料</h2>
                    <div class="form-row">
                        <div class="form-group"><label for="receiver-name">收件人姓名</label><input id="receiver-name" type="text" required></div>
                        <div class="form-group"><label for="receiver-phone">電話</label><input id="receiver-phone" type="tel" required></div>
                    </div>
                    <div class="form-group"><label for="receiver-email">電子信箱</label><input id="receiver-email" type="email" required></div>
                    <div class="form-group"><label for="receiver-address">地址</label><input id="receiver-address" type="text" required></div>
                    <h2>配送與付款</h2>
                    <div class="form-row">
                        <div class="form-group"><label for="shipping-method">配送方式</label><select id="shipping-method"><option value="home">宅配（NT$100）</option><option value="store">超商取貨（NT$65）</option></select></div>
                        <div class="form-group"><label for="payment-method">付款方式</label><select id="payment-method"><option value="信用卡">信用卡</option><option value="貨到付款">貨到付款</option></select></div>
                    </div>
                    <div class="credit-fields" id="credit-card-fields">
                        <div class="form-group"><label for="card-number">信用卡號</label><input id="card-number" type="text" inputmode="numeric" placeholder="0000 0000 0000 0000" required></div>
                        <div class="form-row"><div class="form-group"><label for="card-expiry">有效期限</label><input id="card-expiry" type="text" placeholder="MM/YY" required></div><div class="form-group"><label for="card-cvc">安全碼</label><input id="card-cvc" type="text" inputmode="numeric" placeholder="CVC" required></div></div>
                    </div>
                    <button class="btn btn-block" type="submit">確認送出訂單</button>
                </form>
                <aside class="summary-card">
                    <h2>訂單摘要</h2>
                    <div id="checkout-items"></div>
                    <div class="summary-line"><span>商品小計</span><strong>NT$ <span id="checkout-subtotal">0</span></strong></div>
                    <div class="summary-line"><span>運費</span><strong>NT$ <span id="checkout-shipping">0</span></strong></div>
                    <div class="summary-line total"><span>總金額</span><strong>NT$ <span id="checkout-total">0</span></strong></div>
                </aside>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="footer-bottom">© 2026 萌寵商城・第十三組期末專案</div></footer>
    <script src="js/main.js"></script>
</body>
</html>
