<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入｜萌寵商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-note">滿 NT$3,000 宅配免運・下單前記得確認適用年齡與體型</div>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="index.html"><span class="brand-mark">爪</span><span class="brand-copy">萌寵商城</span></a>
            <form class="global-search-form" role="search"><input type="search" placeholder="搜尋飼料、玩具或保健品" aria-label="搜尋商品"><button type="submit">搜尋</button></form>
            <button class="menu-toggle" type="button" aria-label="開啟導覽選單" aria-expanded="false">☰</button>
            <nav class="nav-links" aria-label="主要導覽"><a href="index.html">首頁</a><a href="products.html">商品總覽</a><a href="about.html">關於我們</a><a class="active" data-member-link href="login.html">會員登入</a><a class="cart-link" href="cart.html">購物車 <span class="cart-count" data-cart-count>0</span></a></nav>
        </div>
    </header>
    <main class="page-main">
        <div class="narrow-container form-shell auth-layout">
            <section class="auth-side"><h1>歡迎回來，今天也幫毛孩挑對用品。</h1><p>登入後可查看毛孩資料與訂單紀錄。</p></section>
            <section class="auth-form">
                <span class="eyebrow">會員登入</span><h2>登入帳號</h2><p>輸入註冊時使用的電子信箱與密碼。</p>
                <form id="login-form">
                    <div class="form-group"><label for="login-email">電子信箱</label><input id="login-email" type="email" autocomplete="email" required></div>
                    <div class="form-group"><label for="login-password">密碼</label><input id="login-password" type="password" autocomplete="current-password" required></div>
                    <p class="form-message" id="login-message"></p>
                    <button class="btn btn-block" type="submit">登入</button>
                </form>
                <p class="auth-switch">還沒有帳號？<a class="text-link" href="register.html">建立會員與毛孩資料</a></p>
            </section>
        </div>
    </main>
    <footer class="site-footer"><div class="footer-bottom">© 2026 萌寵商城・第十三組期末專案</div></footer>
    <script src="js/main.js"></script>
    <script src="js/member.js"></script>
</body>
</html>
